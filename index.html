<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompra App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-100 text-gray-800">
    
    <!-- Pantalla de Login -->
    <div id="login-screen" class="max-w-md mx-auto bg-white min-h-screen p-8 flex flex-col justify-center items-center">
        <h2 class="text-2xl font-bold mb-4 text-center">Acceso a la Despensa</h2>
        <input type="password" id="token-input" placeholder="Ingrese el token de acceso" class="border p-2 mb-4 w-full rounded">
        <button onclick="guardarToken()" class="bg-blue-600 text-white font-semibold px-4 py-2 rounded w-full">Ingresar</button>
    </div>

    <!-- Contenedor Principal (Oculto por defecto) -->
    <div id="app-screen" class="hidden max-w-md mx-auto bg-white min-h-screen p-4 shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Mercado</h1>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 font-semibold">Salir</button>
        </div>
        <div id="lista-compras" class="space-y-3">
            <!-- Los datos se inyectarán aquí -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
