<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompra App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-100 text-gray-800 relative h-screen overflow-hidden">
    
    <!-- Pantalla de Login -->
    <div id="login-screen" class="max-w-md mx-auto bg-white h-full p-8 flex flex-col justify-center items-center z-50 relative">
        <h2 class="text-2xl font-bold mb-4 text-center">Acceso Restringido</h2>
        <input type="password" id="token-input" placeholder="Ingrese el token" class="border p-3 mb-4 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="guardarToken()" class="bg-blue-600 text-white font-bold px-4 py-3 rounded w-full shadow-md">Ingresar</button>
    </div>

    <!-- Contenedor Principal (SPA) -->
    <div id="app-screen" class="hidden max-w-md mx-auto bg-white h-full flex flex-col shadow-lg relative">
        
        <!-- Cabecera -->
        <div class="flex justify-between items-center p-4 bg-white border-b shrink-0">
            <h1 id="titulo-vista" class="text-2xl font-bold">Mercado</h1>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 font-semibold">Salir</button>
        </div>
        
        <!-- Área de Contenido Deslizable -->
        <div class="flex-grow overflow-y-auto p-4 pb-24 bg-gray-50">
            
            <!-- VISTA 1: Lista del Mercado -->
            <div id="vista-mercado" class="space-y-3">
                <div id="lista-compras" class="space-y-3"></div>
                <!-- Botón Flotante (Solo en mercado) -->
                <button onclick="toggleModal('modal-agregar')" class="fixed bottom-20 right-6 bg-green-600 text-white w-14 h-14 rounded-full shadow-lg flex justify-center items-center text-3xl pb-1 z-30">
                    +
                </button>
            </div>

            <!-- VISTA 2: Platos Semanales -->
           <!-- VISTA 2: Planificación y Recetario -->
            <div id="vista-platos" class="hidden space-y-6">
                
                <!-- Sección superior: Acción Principal -->
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-bold text-blue-800">Menú Semanal</h3>
                        <p class="text-xs text-blue-600">Genera la lista para auditar</p>
                    </div>
                    <button onclick="generarListaDeCompras()" id="btn-generar" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow hover:bg-blue-700 transition">
                        Generar Lista
                    </button>
                </div>

                <!-- Botón para invocar modal de nueva receta -->
                <button onclick="toggleModal('modal-receta')" class="w-full border-2 border-dashed border-gray-300 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-50 transition">
                    + Crear Nuevo Plato
                </button>

                <!-- Contenedor donde se renderizarán las recetas guardadas -->
                <div id="lista-recetas" class="grid grid-cols-1 gap-3">
                    <!-- JS inyectará los platos aquí -->
                </div>
            </div>

    <!-- (Fuera del contenedor principal, junto al otro modal, pega este nuevo Modal para Recetas) -->
    <div id="modal-receta" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-end sm:items-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Nueva Receta</h2>
            <form id="form-nueva-receta" onsubmit="guardarReceta(event)">
                
                <input type="text" id="receta-nombre" placeholder="Nombre del plato (Ej. Lomo Saltado)" required class="border p-2 mb-3 w-full rounded focus:outline-none focus:border-blue-500 font-bold text-lg">
                
                <div class="mb-4">
                    <label class="text-sm font-bold text-gray-600 block mb-1">¿Quién paga los ingredientes?</label>
                    <select id="receta-pago" class="border p-2 w-full rounded bg-gray-50">
                        <option value="Ambos">Dividir gasto (Ambos)</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <!-- Gestor de Ingredientes -->
                <div class="border-t border-b py-3 mb-4">
                    <label class="text-sm font-bold text-gray-600 block mb-2">Ingredientes</label>
                    
                    <div class="flex space-x-2 mb-2">
                        <input type="text" id="ingrediente-nombre" placeholder="Producto" class="border p-2 w-1/2 rounded text-sm">
                        <input type="number" id="ingrediente-cant" placeholder="Cant." class="border p-2 w-1/4 rounded text-sm">
                        <select id="ingrediente-unidad" class="border p-2 w-1/4 rounded text-sm">
                            <option value="kg">kg</option>
                            <option value="unid">unid</option>
                            <option value="gr">gr</option>
                        </select>
                    </div>
                    
                    <button type="button" onclick="agregarIngredienteTemporal()" class="w-full bg-gray-100 text-gray-700 font-bold py-2 rounded text-sm mb-3 hover:bg-gray-200">
                        Añadir Ingrediente
                    </button>

                    <!-- Lista temporal de ingredientes antes de guardar -->
                    <ul id="lista-ingredientes-temp" class="space-y-1 text-sm text-gray-600 bg-gray-50 p-2 rounded empty:hidden"></ul>
                </div>

                <div class="flex space-x-3">
                    <button type="button" onclick="cerrarModalReceta()" class="bg-gray-200 px-4 py-2 rounded w-1/2 font-bold text-gray-700">Cancelar</button>
                    <button type="submit" id="btn-guardar-receta" class="bg-blue-600 text-white px-4 py-2 rounded w-1/2 font-bold">Guardar Plato</button>
                </div>
            </form>
        </div>
    </div>

            <!-- VISTA 3: Dashboard -->
            <div id="vista-dashboard" class="hidden">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="text-center font-bold text-gray-700 mb-4">Gastos por Categoría</h3>
                    <canvas id="graficoGastos"></canvas>
                </div>
            </div>

        </div>

        <!-- Barra de Navegación Inferior -->
        <div class="absolute bottom-0 w-full bg-white border-t flex justify-around p-3 pb-6 shrink-0 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="cambiarVista('mercado')" id="nav-mercado" class="flex flex-col items-center w-1/3 text-blue-600">
                <span class="text-xl">🛒</span>
                <span class="text-xs font-bold mt-1">Mercado</span>
            </button>
            <button onclick="cambiarVista('platos')" id="nav-platos" class="flex flex-col items-center w-1/3 text-gray-400">
                <span class="text-xl">🍲</span>
                <span class="text-xs font-bold mt-1">Recetas</span>
            </button>
            <button onclick="cambiarVista('dashboard')" id="nav-dashboard" class="flex flex-col items-center w-1/3 text-gray-400">
                <span class="text-xl">📊</span>
                <span class="text-xs font-bold mt-1">Resumen</span>
            </button>
        </div>
    </div>

    <!-- Modal Formulario -->
    <div id="modal-agregar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-end sm:items-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-t-2xl sm:rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Agregar al carrito</h2>
            <form id="form-nuevo-producto" onsubmit="enviarProducto(event)">
                <input type="text" id="input-producto" placeholder="Producto" required class="border p-2 mb-3 w-full rounded focus:outline-none focus:border-blue-500">
                
                <div class="flex space-x-2 mb-3">
                    <input type="number" id="input-cantidad" placeholder="Cant." step="0.1" required class="border p-2 w-1/3 rounded">
                    <select id="input-unidad" class="border p-2 w-2/3 rounded">
                        <option value="kg">kg</option>
                        <option value="unidades">unidades</option>
                        <option value="litros">litros</option>
                    </select>
                </div>

                <select id="input-categoria" class="border p-2 mb-4 w-full rounded">
                    <option value="Verduras">Verduras</option>
                    <option value="Carnes">Carnes</option>
                    <option value="Abarrotes">Abarrotes</option>
                    <option value="Mascotas">Mascotas</option>
                </select>

                <div class="flex space-x-3">
                    <button type="button" onclick="toggleModal('modal-agregar')" class="bg-gray-200 px-4 py-2 rounded w-1/2 font-bold">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="bg-blue-600 text-white px-4 py-2 rounded w-1/2 font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
