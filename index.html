<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompra App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gray-100 text-gray-800 relative h-screen overflow-hidden">
    
    <!-- Pantalla de Login -->
    <div id="login-screen" class="max-w-md mx-auto bg-white h-full p-8 flex flex-col justify-center items-center z-50 relative">
        <h2 class="text-2xl font-bold mb-4 text-center">Acceso Restringido</h2>
        <input type="password" id="token-input" placeholder="Ingrese el token" class="border p-3 mb-4 w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="guardarToken()" class="bg-blue-600 text-white font-bold px-4 py-3 rounded w-full shadow-md">Ingresar</button>
    </div>

    <!-- Contenedor Principal (SPA) -->
    <div id="app-screen" class="hidden max-w-md mx-auto bg-white h-full flex flex-col shadow-lg relative">
        
        <!-- Cabecera -->
        <div class="flex justify-between items-center p-4 bg-white border-b shrink-0">
            <h1 id="titulo-vista" class="text-2xl font-bold">Mercado</h1>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 font-semibold">Salir</button>
        </div>
        
        <!-- Área de Contenido Deslizable -->
        <div class="flex-grow overflow-y-auto p-4 pb-24 bg-gray-50">
            
            <!-- VISTA 1: Lista del Mercado -->
            <div id="vista-mercado" class="space-y-3">
                <div id="lista-compras" class="space-y-3"></div>
                <!-- Botón Flotante (Solo en mercado) -->
                <button onclick="toggleModal('modal-agregar')" class="fixed bottom-20 right-6 bg-green-600 text-white w-14 h-14 rounded-full shadow-lg flex justify-center items-center text-3xl pb-1 z-30">
                    +
                </button>
            </div>

            <!-- VISTA 2: Platos Semanales -->
            <div id="vista-platos" class="hidden">
                <div id="lista-platos" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- VISTA 3: Dashboard -->
            <div id="vista-dashboard" class="hidden">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="text-center font-bold text-gray-700 mb-4">Gastos por Categoría</h3>
                    <canvas id="graficoGastos"></canvas>
                </div>
            </div>

        </div>

        <!-- Barra de Navegación Inferior -->
        <div class="absolute bottom-0 w-full bg-white border-t flex justify-around p-3 pb-6 shrink-0 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="cambiarVista('mercado')" id="nav-mercado" class="flex flex-col items-center w-1/3 text-blue-600">
                <span class="text-xl">🛒</span>
                <span class="text-xs font-bold mt-1">Mercado</span>
            </button>
            <button onclick="cambiarVista('platos')" id="nav-platos" class="flex flex-col items-center w-1/3 text-gray-400">
                <span class="text-xl">🍲</span>
                <span class="text-xs font-bold mt-1">Recetas</span>
            </button>
            <button onclick="cambiarVista('dashboard')" id="nav-dashboard" class="flex flex-col items-center w-1/3 text-gray-400">
                <span class="text-xl">📊</span>
                <span class="text-xs font-bold mt-1">Resumen</span>
            </button>
        </div>
    </div>

    <!-- Modal Formulario -->
    <div id="modal-agregar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-end sm:items-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-t-2xl sm:rounded-2xl">
            <h2 class="text-xl font-bold mb-4">Agregar al carrito</h2>
            <form id="form-nuevo-producto" onsubmit="enviarProducto(event)">
                <input type="text" id="input-producto" placeholder="Producto" required class="border p-2 mb-3 w-full rounded focus:outline-none focus:border-blue-500">
                
                <div class="flex space-x-2 mb-3">
                    <input type="number" id="input-cantidad" placeholder="Cant." step="0.1" required class="border p-2 w-1/3 rounded">
                    <select id="input-unidad" class="border p-2 w-2/3 rounded">
                        <option value="kg">kg</option>
                        <option value="unidades">unidades</option>
                        <option value="litros">litros</option>
                    </select>
                </div>

                <select id="input-categoria" class="border p-2 mb-4 w-full rounded">
                    <option value="Verduras">Verduras</option>
                    <option value="Carnes">Carnes</option>
                    <option value="Abarrotes">Abarrotes</option>
                    <option value="Mascotas">Mascotas</option>
                </select>

                <div class="flex space-x-3">
                    <button type="button" onclick="toggleModal('modal-agregar')" class="bg-gray-200 px-4 py-2 rounded w-1/2 font-bold">Cancelar</button>
                    <button type="submit" id="btn-guardar" class="bg-blue-600 text-white px-4 py-2 rounded w-1/2 font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
