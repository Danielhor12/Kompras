<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema del Hogar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col text-sm">
    
    <!-- Spinner de Sincronización -->
    <div id="sync-spinner" class="hidden fixed top-2 right-2 bg-blue-600 text-white px-3 py-1 rounded-full text-xs shadow z-50">Sincronizando...</div>

    <header class="bg-white shadow-sm p-4 text-center font-bold text-lg text-gray-800 shrink-0">Gestión del Hogar</header>

    <main class="flex-1 overflow-y-auto p-4 pb-20">
        
        <section id="view-recetario" class="hidden space-y-4">
            <button onclick="ui.toggleModal('modal-receta')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow">+ Nuevo Plato</button>
            <div id="lista-recetario" class="space-y-3"></div>
        </section>

        <section id="view-plan" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold mb-2">Programar Almuerzo</h3>
                <input type="date" id="plan-fecha" class="border p-2 w-full mb-2 rounded">
                <select id="plan-plato" class="border p-2 w-full mb-3 rounded"></select>
                <button onclick="app.guardarPlan()" class="w-full bg-green-600 text-white font-bold py-2 rounded">Añadir al Calendario</button>
            </div>
            <div id="lista-plan" class="grid grid-cols-1 gap-2"></div>
        </section>

        <section id="view-mercado" class="hidden space-y-4">
            <button onclick="ui.toggleModal('modal-item-manual')" class="w-full border-2 border-dashed border-gray-400 text-gray-600 font-bold py-2 rounded-lg">+ Añadir Artículo Manual</button>
            <div id="lista-mercado"></div>
        </section>

        <section id="view-reportes" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="font-bold text-lg mb-2">Resumen Semana Actual</h3>
                <div id="reporte-gastos" class="grid grid-cols-2 gap-4 mb-4 text-center"></div>
                <div id="reporte-deudas" class="p-3 bg-red-50 text-red-800 rounded font-bold text-center mb-4"></div>
                <button onclick="app.cerrarSemana()" class="w-full bg-red-600 text-white font-bold py-3 rounded">CERRAR SEMANA</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <canvas id="chartHistorico"></canvas>
            </div>
        </section>
    </main>

    <nav class="bg-white border-t flex justify-around p-3 pb-6 fixed bottom-0 w-full shrink-0">
        <button onclick="ui.nav('recetario')" class="text-blue-600 font-bold text-xs flex flex-col items-center"><span>🍲</span>Recetario</button>
        <button onclick="ui.nav('plan')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>📅</span>Plan</button>
        <button onclick="ui.nav('mercado')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>🛒</span>Mercado</button>
        <button onclick="ui.nav('reportes')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>📊</span>Reportes</button>
    </nav>

    <div id="modal-receta" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl max-h-full overflow-y-auto">
            <h2 class="font-bold mb-3">Nueva Receta</h2>
            <input type="text" id="rec-nombre" placeholder="Nombre del plato" class="w-full border p-2 mb-3 rounded">
            
            <div class="bg-gray-50 p-3 rounded mb-3 border">
                <h4 class="text-xs font-bold mb-2">Ingredientes Temporales</h4>
                <div class="flex gap-1 mb-2">
                    <input type="text" id="rec-ing-art" placeholder="Artículo" class="border p-2 w-1/3 rounded text-xs" list="datalist-dicc">
                    <select id="rec-ing-cat" class="border p-2 w-1/3 rounded text-xs">
                        <option>abarrotes</option><option>carnes</option><option>frutas</option><option>verduras</option><option>condimentos</option><option>otros</option>
                    </select>
                    <select id="rec-ing-uni" class="border p-2 w-1/3 rounded text-xs">
                        <option>kg</option><option>bolsa</option><option>litros</option><option>unidad</option><option>soles</option>
                    </select>
                </div>
                <button type="button" onclick="app.addIngredienteTemp()" class="w-full bg-gray-200 py-1 rounded text-xs font-bold mb-2">+ Añadir Ingrediente</button>
                <ul id="lista-ingredientes-temp" class="text-xs space-y-1"></ul>
            </div>
            <div class="flex gap-2">
                <button onclick="ui.toggleModal('modal-receta')" class="w-1/2 bg-gray-300 py-2 rounded font-bold">Cancelar</button>
                <button onclick="app.guardarReceta()" class="w-1/2 bg-blue-600 text-white py-2 rounded font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal-item-manual" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl">
            <h2 class="font-bold mb-3">Agregar al Mercado</h2>
            <input type="text" id="man-art" placeholder="Artículo" class="w-full border p-2 mb-2 rounded" list="datalist-dicc">
            <select id="man-cat" class="w-full border p-2 mb-2 rounded"><option>abarrotes</option><option>carnes</option><option>frutas</option><option>verduras</option><option>condimentos</option><option>otros</option></select>
            <select id="man-uni" class="w-full border p-2 mb-2 rounded"><option>kg</option><option>bolsa</option><option>litros</option><option>unidad</option><option>soles</option></select>
            <div class="flex gap-2 mb-3">
                <select id="man-para" class="w-1/2 border p-2 rounded"><option>Ambos</option><option>Carlos</option><option>Daniel</option></select>
                <select id="man-quien" class="w-1/2 border p-2 rounded"><option>Pendiente</option><option>Carlos</option><option>Daniel</option></select>
            </div>
            <input type="number" id="man-precio" placeholder="Precio S/" class="w-full border p-2 mb-4 rounded">
            
            <div class="flex gap-2">
                <button onclick="ui.toggleModal('modal-item-manual')" class="w-1/2 bg-gray-300 py-2 rounded font-bold">Cancelar</button>
                <button onclick="app.guardarManual()" class="w-1/2 bg-green-600 text-white py-2 rounded font-bold">Agregar</button>
            </div>
        </div>
    </div>

    <datalist id="datalist-dicc"></datalist>
    <script src="app.js"></script>
</body>
</html>
