<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema del Hogar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col text-sm relative">
    <div id="sync-spinner" class="hidden fixed top-2 right-2 bg-blue-600 text-white px-3 py-1 rounded-full text-xs shadow z-50">Sincronizando...</div>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" class="absolute inset-0 bg-white flex flex-col justify-center items-center z-50">
        <h2 class="text-2xl font-bold mb-4">Acceso Seguro</h2>
        <div class="w-3/4 max-w-sm">
            <input type="password" id="token-input" placeholder="Token" class="border p-3 mb-4 w-full rounded">
            <button onclick="auth.guardarToken()" class="bg-blue-600 text-white font-bold p-3 rounded w-full">Ingresar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full w-full">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center text-lg shrink-0">
            <span class="font-bold">Gestión del Hogar</span>
            <button onclick="auth.cerrarSesion()" class="text-xs font-bold text-red-500">Salir</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24">
            <!-- Vistas ocultas/visibles por JS -->
            <section id="view-recetario" class="hidden space-y-4"></section>
            <section id="view-plan" class="hidden space-y-4"></section>
            <section id="view-mercado" class="hidden space-y-4"></section>
            <section id="view-pagos" class="hidden space-y-4"></section>
            <section id="view-reportes" class="hidden space-y-4"></section>
        </main>

        <nav class="bg-white border-t flex justify-around p-3 pb-6 fixed bottom-0 w-full z-40">
            <button id="btn-nav-recetario" onclick="ui.nav('recetario')" class="font-bold text-xs">🍲 Recetas</button>
            <button id="btn-nav-plan" onclick="ui.nav('plan')" class="font-bold text-xs">📅 Plan</button>
            <button id="btn-nav-mercado" onclick="ui.nav('mercado')" class="font-bold text-xs">🛒 Mercado</button>
            <button id="btn-nav-pagos" onclick="ui.nav('pagos')" class="font-bold text-xs">💰 Pagos</button>
            <button id="btn-nav-reportes" onclick="ui.nav('reportes')" class="font-bold text-xs">📊 Reportes</button>
        </nav>
    </div>

    <!-- MODAL RECETA (Con campo Comentario) -->
    <div id="modal-receta" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl max-h-full overflow-y-auto">
            <h2 id="titulo-modal-receta" class="font-bold mb-3">Nueva Receta</h2>
            <input type="text" id="rec-nombre" placeholder="Nombre" class="w-full border p-2 mb-3 rounded">
            <div class="bg-gray-50 p-3 rounded mb-3 border">
                <input type="text" id="rec-ing-art" placeholder="Artículo" class="border p-2 w-full mb-1 rounded text-xs">
                <input type="text" id="rec-ing-com" placeholder="Comentario..." class="border p-2 w-full mb-1 rounded text-xs">
                <button type="button" onclick="app.addIngredienteTemp('rec')" class="w-full bg-blue-100 py-2 rounded text-xs font-bold">+ Ingrediente</button>
                <ul id="lista-ingredientes-temp" class="text-xs mt-3"></ul>
            </div>
            <button onclick="app.guardarReceta()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Guardar</button>
        </div>
    </div>
    
    <!-- MODAL MANUAL MERCADO (Con campo Comentario) -->
    <div id="modal-item-manual" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl">
            <input type="text" id="man-com" placeholder="Comentario..." class="w-full border p-2 mb-2 rounded">
            <button onclick="app.guardarManual()" class="w-full bg-green-600 text-white py-2 rounded font-bold">Agregar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
