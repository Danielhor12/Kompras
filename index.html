<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema del Hogar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col text-sm relative">
    
    <div id="sync-spinner" class="hidden fixed top-2 right-2 bg-blue-600 text-white px-3 py-1 rounded-full text-xs shadow z-50">Cargando...</div>

    <div id="login-screen" class="absolute inset-0 bg-white flex flex-col justify-center items-center z-50">
        <h2 class="text-2xl font-bold mb-4">Acceso Seguro</h2>
        <div class="w-3/4 max-w-sm">
            <input type="password" id="token-input" placeholder="Ingrese el token" class="border p-3 mb-4 w-full rounded focus:outline-none focus:border-blue-500">
            <button onclick="auth.guardarToken()" class="bg-blue-600 text-white font-bold px-4 py-3 rounded w-full shadow">Ingresar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full w-full">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center text-lg text-gray-800 shrink-0">
            <span class="font-bold">Gestión del Hogar</span>
            <button onclick="auth.cerrarSesion()" class="text-xs font-bold text-red-500">Salir</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24">
            
            <!-- RECETARIO -->
            <section id="view-recetario" class="hidden space-y-4">
                <button onclick="app.abrirNuevaReceta()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow">+ Nuevo Plato</button>
                <div id="lista-recetario" class="space-y-3"></div>
            </section>

            <!-- PLAN SEMANAL -->
            <section id="view-plan" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="font-bold mb-3 text-gray-800">Programar Almuerzo</h3>
                    <input type="date" id="plan-fecha" class="border border-gray-300 p-2 w-full mb-2 rounded focus:ring-2 focus:ring-blue-500">
                    <select id="plan-plato" class="border border-gray-300 p-2 w-full mb-3 rounded focus:ring-2 focus:ring-blue-500"></select>
                    <button id="btn-save-plan" onclick="app.guardarPlan()" class="w-full bg-green-600 text-white font-bold py-3 rounded shadow hover:bg-green-700 transition">Añadir al Calendario</button>
                </div>
                
                <div class="bg-gray-200 p-3 rounded-xl flex gap-2 items-center justify-between">
                    <div class="flex gap-2 flex-1">
                        <input type="date" id="filtro-inicio" class="border p-1 text-xs w-full rounded" onchange="renderPlan()">
                        <input type="date" id="filtro-fin" class="border p-1 text-xs w-full rounded" onchange="renderPlan()">
                    </div>
                    <button onclick="document.getElementById('filtro-inicio').value=''; document.getElementById('filtro-fin').value=''; renderPlan();" class="text-xs font-bold bg-white text-gray-600 px-2 py-1 rounded">Limpiar</button>
                </div>

                <div id="lista-plan" class="space-y-3 mt-2"></div>
            </section>

            <!-- MERCADO -->
            <section id="view-mercado" class="hidden space-y-4">
                <button onclick="ui.toggleModal('modal-item-manual')" class="w-full border-2 border-dashed border-gray-400 text-gray-600 font-bold py-3 rounded-lg bg-white">+ Añadir Artículo Manual</button>
                <div id="lista-mercado"></div>
            </section>

            <!-- REPORTES -->
            <section id="view-reportes" class="hidden space-y-4">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-lg mb-4 text-center">Cierre de Semana</h3>
                    <button onclick="app.calcularReportes()" class="w-full bg-blue-600 text-white font-bold py-3 rounded shadow-md mb-4 hover:bg-blue-700">Calcular Compras del Mercado</button>
                    
                    <div id="resultados-reporte" class="hidden">
                        <div id="reporte-gastos" class="grid grid-cols-2 gap-4 mb-4 text-center"></div>
                        <div id="reporte-deudas" class="p-4 bg-gray-50 text-gray-800 rounded-lg font-bold text-center mb-6 border border-gray-200"></div>
                        <button onclick="app.cerrarSemana()" class="w-full bg-red-600 text-white font-bold py-3 rounded shadow hover:bg-red-700">CERRAR SEMANA</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bg-white border-t flex justify-around p-3 pb-6 fixed bottom-0 w-full shrink-0 z-40">
            <button id="btn-nav-recetario" onclick="ui.nav('recetario')" class="text-blue-600 font-bold text-xs flex flex-col items-center"><span>🍲</span>Recetario</button>
            <button id="btn-nav-plan" onclick="ui.nav('plan')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>📅</span>Plan</button>
            <button id="btn-nav-mercado" onclick="ui.nav('mercado')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>🛒</span>Mercado</button>
            <button id="btn-nav-reportes" onclick="ui.nav('reportes')" class="text-gray-500 font-bold text-xs flex flex-col items-center"><span>📊</span>Reportes</button>
        </nav>
    </div>

    <!-- MODAL RECETA -->
    <div id="modal-receta" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl max-h-full overflow-y-auto">
            <h2 id="titulo-modal-receta" class="font-bold mb-3 text-lg">Nueva Receta</h2>
            <input type="text" id="rec-nombre" placeholder="Nombre del plato" class="w-full border p-2 mb-3 rounded font-bold text-gray-800 focus:ring-2 focus:ring-blue-500">
            
            <div class="bg-gray-50 p-3 rounded mb-3 border border-gray-200">
                <h4 class="text-xs font-bold mb-2 text-gray-600">Ingredientes</h4>
                <div class="flex gap-1 mb-2">
                    <input type="text" id="rec-ing-art" placeholder="Artículo" class="border p-2 w-2/5 rounded text-xs focus:ring-1 focus:ring-blue-500" list="datalist-dicc">
                    <input type="number" id="rec-ing-cant" placeholder="Cant." class="border p-2 w-1/5 rounded text-xs focus:ring-1 focus:ring-blue-500" step="0.1">
                    <select id="rec-ing-cat" class="border p-2 w-1/5 rounded text-xs"><option>abarrotes</option><option>carnes</option><option>frutas</option><option>verduras</option><option>condimentos</option><option>otros</option></select>
                    <select id="rec-ing-uni" class="border p-2 w-1/5 rounded text-xs"><option>kg</option><option>bolsa</option><option>litros</option><option>unidad</option><option>soles</option></select>
                </div>
                <!-- NUEVO: Para y Quién Pagó por ingrediente -->
                <div class="flex gap-1 mb-2">
                    <select id="rec-ing-para" class="border p-2 w-1/2 rounded text-xs font-bold"><option value="Ambos">Para: Ambos</option><option value="Carlos">Para: Carlos</option><option value="Daniel">Para: Daniel</option></select>
                    <select id="rec-ing-quien" class="border p-2 w-1/2 rounded text-xs font-bold"><option value="Pendiente">Pago: Pendiente</option><option value="Carlos">Pago: Carlos</option><option value="Daniel">Pago: Daniel</option></select>
                </div>
                <button type="button" onclick="app.addIngredienteTemp()" class="w-full bg-blue-100 text-blue-700 py-2 rounded text-xs font-bold hover:bg-blue-200 transition">+ Añadir Ingrediente</button>
                <ul id="lista-ingredientes-temp" class="text-xs mt-3 space-y-1 bg-white rounded p-2 border border-gray-200 empty:hidden"></ul>
            </div>
            
            <div class="flex gap-2">
                <button onclick="ui.toggleModal('modal-receta')" class="w-1/2 bg-gray-200 py-3 rounded font-bold text-gray-700 hover:bg-gray-300">Cancelar</button>
                <button id="btn-save-receta" onclick="app.guardarReceta()" class="w-1/2 bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL MANUAL MERCADO -->
    <div id="modal-item-manual" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-md p-5 rounded-xl">
            <h2 class="font-bold mb-3">Agregar al Mercado</h2>
            <input type="text" id="man-art" placeholder="Artículo" class="w-full border p-2 mb-2 rounded" list="datalist-dicc">
            <select id="man-cat" class="w-full border p-2 mb-2 rounded"><option>abarrotes</option><option>carnes</option><option>frutas</option><option>verduras</option><option>condimentos</option><option>otros</option></select>
            <select id="man-uni" class="w-full border p-2 mb-2 rounded"><option>kg</option><option>bolsa</option><option>litros</option><option>unidad</option><option>soles</option></select>
            <div class="flex gap-2 mb-3">
                <select id="man-para" class="w-1/2 border p-2 rounded font-bold"><option>Ambos</option><option>Carlos</option><option>Daniel</option></select>
                <select id="man-quien" class="w-1/2 border p-2 rounded font-bold"><option>Pendiente</option><option>Carlos</option><option>Daniel</option></select>
            </div>
            <input type="number" id="man-precio" placeholder="Precio S/" class="w-full border p-2 mb-4 rounded font-bold">
            <div class="flex gap-2">
                <button onclick="ui.toggleModal('modal-item-manual')" class="w-1/2 bg-gray-300 py-2 rounded font-bold">Cancelar</button>
                <button id="btn-save-manual" onclick="app.guardarManual()" class="w-1/2 bg-green-600 text-white py-2 rounded font-bold">Agregar</button>
            </div>
        </div>
    </div>

    <datalist id="datalist-dicc"></datalist>
    <script src="app.js"></script>
</body>
</html>
